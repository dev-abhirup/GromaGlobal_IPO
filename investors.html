<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting to Investor Relations - GROMA GLOBAL LIMITED</title>
  <link rel="canonical" href="https://gromaglobal.com/investor/corporate-announcement/" />
  <script>
    (function() {
      var hash = window.location.hash.substring(1);
      var routeToTabMap = {
        "corporate-announcement": "corporate-announcement",
        "board-of-directors": "board-of-directors",
        "committee-board": "committee-board",
        "key-managerial-personnel": "key-managerial-personnel",
        "group-subsidiaries": "group-subsidiaries",
        "corporate-policies": "corporate-policies",
        "ipo": "ipo",
        "initial-public-offering": "ipo",
        "investor-presentation": "investor-presentation",
        "financial-results": "financial-results",
        "shareholding-pattern": "shareholding-pattern",
        "corporate-information": "corporate-information",
        "investor-grievances": "investor-grievances",
        "material-contracts": "material-contracts",
        "material-creditors": "material-creditors",
        "material-documents": "material-documents"
      };
      
      var target = "corporate-announcement";
      if (hash && routeToTabMap[hash]) {
        target = routeToTabMap[hash];
      }
      window.location.replace("investor/" + target + "/");
    })();
  </script>
  <meta http-equiv="refresh" content="0; url=investor/corporate-announcement/">
</head>
<body>
  <p>If you are not redirected, <a href="investor/corporate-announcement/">click here</a>.</p>
</body>
</html>
